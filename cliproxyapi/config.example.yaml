host: "0.0.0.0"
port: 3003
remote-management:
  allow-remote: true
  secret-key: "YOUR_SECRET_KEY_HERE"
  disable-control-panel: false
auth-dir: "/opt/cliproxyapi/auth"
api-keys:
  - "YOUR_API_KEY_HERE"
debug: false
logging-to-file: true
usage-statistics-enabled: true
request-retry: 3
max-retry-interval: 30
quota-exceeded:
  switch-project: true
  switch-preview-model: true
