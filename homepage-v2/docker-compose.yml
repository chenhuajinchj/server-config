services:
  homepage:
    build: .
    ports:
      - "8080:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SECRET=${ADMIN_SECRET}
    networks:
      - lsky_default
    restart: unless-stopped

networks:
  lsky_default:
    external: true
